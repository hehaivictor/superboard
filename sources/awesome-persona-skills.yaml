audited_at: "2026-05-12"
usage_policy: >
  Treat the catalog as an upstream index. Directly imported persona assets must
  have their own license checked. When no direct upstream exists, use the
  nuwa-skill extraction framework with concrete public sources, create a full
  local artifact under nuwa_distillations/<persona-id>/, then compress that
  artifact into the board persona dossier instead of copying external text.
