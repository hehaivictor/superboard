board_id: default
name: Super Board 本体董事会
description: 产品需求、项目计划、商业计划的多委员会本体化审议配置。
supported_input_types:
  - product_requirement
  - project_plan
  - business_plan
committees:
  - id: business-leaders
    name: 商业与长期价值委员会
    review_focus: 客户价值、长期商业质量、现金流、护城河和管理责任。
    output_expectations: 选择本次最相关席位，输出证据约束、反证信号和可执行判断。
    personas:
      - warren-buffett
      - jeff-bezos
      - peter-drucker
  - id: startup-mentors
    name: 创业与非共识机会委员会
    review_focus: 创业切口、产品直觉、非共识机会、秘密和垄断潜力。
    output_expectations: 选择本次最相关席位，输出证据约束、反证信号和可执行判断。
    personas:
      - steve-jobs
      - peter-thiel
      - paul-graham
  - id: investment-masters
    name: 投资与风险委员会
    review_focus: 误判、激励、尾部风险、周期和资本效率。
    output_expectations: 选择本次最相关席位，输出证据约束、反证信号和可执行判断。
    personas:
      - charlie-munger
      - nassim-taleb
      - ray-dalio
  - id: consulting-elite
    name: 战略与竞争委员会
    review_focus: 竞争结构、战略诊断、取舍、关键难点和避实击虚。
    output_expectations: 选择本次最相关席位，输出证据约束、反证信号和可执行判断。
    personas:
      - michael-porter
      - richard-rumelt
      - sun-tzu
  - id: product-users
    name: 产品与用户委员会
    review_focus: 产品发现、人因体验、用户心智和端到端体验。
    output_expectations: 选择本次最相关席位，输出证据约束、反证信号和可执行判断。
    personas:
      - marty-cagan
      - don-norman
      - zhang-xiaolong
  - id: organization-china
    name: 组织与中国商业实践委员会
    review_focus: 组织韧性、长期投入、信息效率、经营责任和中国商业实践。
    output_expectations: 选择本次最相关席位，输出证据约束、反证信号和可执行判断。
    personas:
      - ren-zhengfei
      - zhang-yiming
      - kazuo-inamori
  - id: philosophy-humanities
    name: 哲学与人文委员会
    review_focus: 价值判断、系统平衡、责任伦理和知行合一。
    output_expectations: 选择本次最相关席位，输出证据约束、反证信号和可执行判断。
    personas:
      - laozi
      - confucius
      - wang-yangming
