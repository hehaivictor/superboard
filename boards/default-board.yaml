board_id: default
name: Super Board 本体董事会
description: 产品需求、项目计划、商业计划的多委员会本体化审议配置。
supported_input_types:
  - product_requirement
  - project_plan
  - business_plan
committees:
  - id: business-leaders
    name: 商业委员会
    review_focus: 客户倒推、长期商业质量、管理责任和组织使命。
    output_expectations: 判断方向是否足够重要、现金流和护城河是否成立、组织是否能交付。
    personas:
      - jeff-bezos
      - warren-buffett
      - peter-drucker
  - id: startup-mentors
    name: 创业委员会
    review_focus: 早期用户强痛点、颠覆式路径、高不确定性假设验证。
    output_expectations: 判断是否有真实用户拉力、是否能从小切口学习并进入大市场。
    personas:
      - paul-graham
      - clayton-christensen
      - rita-mcgrath
  - id: investment-masters
    name: 投资委员会
    review_focus: 误判、激励、尾部风险、系统周期和资本效率。
    output_expectations: 判断长期价值、下行风险、资本效率和可恢复性。
    personas:
      - charlie-munger
      - nassim-taleb
      - ray-dalio
  - id: consulting-elite
    name: 咨询委员会
    review_focus: 竞争战略、关键诊断、战略选择和连贯行动。
    output_expectations: 判断战略选项、执行路径、组织协同和可衡量结果。
    personas:
      - michael-porter
      - richard-rumelt
      - roger-martin
  - id: product-users
    name: 产品委员会
    review_focus: 产品发现、人因体验、端到端体验和用户可感知价值。
    output_expectations: 判断用户价值、使用阻力、产品风险和下一步实验。
    personas:
      - marty-cagan
      - don-norman
      - steve-jobs
