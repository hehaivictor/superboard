mode_id: quick_triage
name: 快速审议
description: 用最少委员会快速判断材料是否值得进入深度董事会审议。
recommended_for:
  - 短产品想法
  - 早期项目判断
  - 需要快速识别最大机会和最大风险的材料
enabled_committees:
  - business-leaders
  - startup-mentors
  - product-users
required_sections:
  - 一页结论
  - 输入材料与审议范围
  - Go / No-Go / Pivot 建议
  - 核心判断依据
  - 30 / 60 / 90 天行动计划
  - 附录 A：证据包
  - 附录 B：待验证假设
depth: quick
include_persona_appendix: false
