mode_id: synthetic_user_panel
name: 用户模拟委员会
description: 基于输入材料模拟目标用户阻力、购买顾虑、替代方案和真实访谈问题；所有结论默认作为待验证线索。
recommended_for:
  - 产品概念测试
  - 定价与包装预判
  - 用户访谈准备
  - 市场阻力排查
enabled_committees:
  - startup-mentors
  - product-users
  - synthetic-users
required_sections:
  - 一页结论
  - 输入材料与审议范围
  - Go / No-Go / Pivot 建议
  - 核心判断依据
  - 五个委员会意见
  - 最大机会、最大风险与反证路径
  - 30 / 60 / 90 天行动计划
  - 附录 A：证据包
  - 附录 B：待验证假设
depth: focused
include_persona_appendix: false
