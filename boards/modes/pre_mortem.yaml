mode_id: pre_mortem
name: 事前验尸
description: 假设项目已经失败，倒推最可能的失败路径、早期信号和防护动作。
recommended_for:
  - 项目启动前复核
  - 资源投入前风险审查
  - 里程碑计划校验
enabled_committees:
  - business-leaders
  - startup-mentors
  - investment-masters
  - consulting-elite
  - product-users
  - organization-china
  - philosophy-humanities
required_sections:
  - 一页结论
  - 输入材料与审议范围
  - 本次审议席位
  - Go / No-Go / Pivot 建议
  - 核心判断依据
  - 席位代表观点
  - 最大机会、最大风险与反证路径
  - 30 / 60 / 90 天行动计划
  - 附录 A：证据包
  - 附录 B：待验证假设
depth: focused
include_persona_appendix: false
