mode_id: product_discovery
name: 产品发现审议
description: 聚焦用户任务、使用阻力、价值风险、可用性风险和下一步发现实验。
recommended_for:
  - PRD
  - MVP 需求
  - 用户研究计划
  - 产品路线图
enabled_committees:
  - business-leaders
  - startup-mentors
  - investment-masters
  - consulting-elite
  - product-users
  - organization-china
  - philosophy-humanities
required_sections:
  - 一页结论
  - 输入材料与审议范围
  - 本次审议席位
  - Go / No-Go / Pivot 建议
  - 核心判断依据
  - 委员会意见
  - 席位代表观点
  - 最大机会、最大风险与反证路径
  - 30 / 60 / 90 天行动计划
  - 附录 A：证据包
  - 附录 B：待验证假设
depth: focused
include_persona_appendix: true
