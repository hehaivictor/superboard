mode_id: red_team
name: 红队反证审查
description: 优先寻找方案失败路径、误判来源、证据缺口和停止条件。
recommended_for:
  - 已有明确方案但担心盲点
  - 投入前风险复核
  - 需要反方审查的项目
enabled_committees:
  - business-leaders
  - startup-mentors
  - investment-masters
  - consulting-elite
  - product-users
  - organization-china
  - philosophy-humanities
required_sections:
  - 一页结论
  - 输入材料与审议范围
  - 本次审议席位
  - Go / No-Go / Pivot 建议
  - 核心判断依据
  - 席位代表观点
  - 跨委员会共识与关键分歧
  - 最大机会、最大风险与反证路径
  - 附录 A：证据包
  - 附录 B：待验证假设
depth: focused
include_persona_appendix: false
