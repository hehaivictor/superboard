mode_id: deep_board_review
name: 深度董事会审议
description: 默认完整审议模式，覆盖五个委员会、证据强度、分歧、反证和 30 / 60 / 90 天行动。
recommended_for:
  - 产品需求
  - 项目计划
  - 商业计划
  - 需要可转发董事会建议书的材料
enabled_committees:
  - business-leaders
  - startup-mentors
  - investment-masters
  - consulting-elite
  - product-users
required_sections:
  - 一页结论
  - 输入材料与审议范围
  - Go / No-Go / Pivot 建议
  - 核心判断依据
  - 五个委员会意见
  - 跨委员会共识与关键分歧
  - 最大机会、最大风险与反证路径
  - 30 / 60 / 90 天行动计划
  - 附录 A：证据包
  - 附录 B：待验证假设
  - 附录 C：Persona 关键意见摘要
  - 附录 D：决策记录
depth: deep
include_persona_appendix: true
